<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>🎧 Reproductor Web</title>
  <style>
    /* ============================================
       VARIABLES CSS (modo oscuro por defecto)
    ============================================ */
    :root {
      --bg: #0a0a0f;
      --surface: #14141f;
      --surface2: #1f1f2e;
      --text: #e8e8f0;
      --text-secondary: #9a9ab0;
      --acento: #7c5cfc;
      --acento-hover: #9370ff;
      --progreso-bg: #2a2a3a;
      --radio: 20px;
      --radio-sm: 12px;
      --sombra: 0 12px 36px rgba(0,0,0,0.5);
      --transicion: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 50% 20%, rgba(124,92,252,0.1) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 90%, rgba(92,60,252,0.05) 0%, transparent 50%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
      color: var(--text);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ============================================
       TARJETA DEL REPRODUCTOR
    ============================================ */
    .reproductor {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 28px;
      padding: 2rem 1.5rem 1.25rem;
      width: 100%;
      max-width: 440px;
      box-shadow: var(--sombra), 0 0 80px rgba(124,92,252,0.1);
      backdrop-filter: blur(10px);
      transition: all var(--transicion);
    }

    /* ============================================
       PORTADA (efecto vinilo giratorio)
    ============================================ */
    .contenedor-portada {
      position: relative;
      width: 180px;
      height: 180px;
      margin: 0 auto 1rem;
      border-radius: 50%;
    }

    .anillo-portada {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: var(--acento);
      border-right-color: var(--acento);
      opacity: 0;
      transition: opacity 0.5s;
      pointer-events: none;
    }

    .reproductor.reproduciendo .anillo-portada {
      opacity: 1;
      animation: girar 5s linear infinite;
    }

    @keyframes girar {
      to { transform: rotate(360deg); }
    }

    .portada {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 8px 28px rgba(0,0,0,0.6);
      transition: transform var(--transicion);
      background: var(--surface2);
    }

    .reproductor.reproduciendo .portada {
      animation: latido 4s ease-in-out infinite;
    }

    @keyframes latido {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    .portada-placeholder {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: linear-gradient(135deg, #2a1a5e, #1a1050, #1e1a3a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      opacity: 0.7;
    }

    /* ============================================
       ECUALIZADOR ANIMADO
    ============================================ */
    .ecualizador {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 4px;
      height: 26px;
      margin: 0.25rem 0 0;
      opacity: 0.4;
      transition: opacity 0.4s;
    }

    .reproductor.reproduciendo .ecualizador {
      opacity: 0.95;
    }

    .barra-eq {
      width: 4px;
      border-radius: 2px;
      background: var(--acento);
      transition: height 0.15s ease;
      min-height: 3px;
    }

    /* ============================================
       INFORMACIÓN DE LA CANCIÓN
    ============================================ */
    .info-cancion {
      text-align: center;
      margin: 0.75rem 0 1rem;
      min-height: 3rem;
    }

    .titulo-cancion {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .artista-cancion {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sin-cancion {
      color: var(--text-secondary);
      font-style: italic;
      padding: 0.5rem 0;
    }

    /* ============================================
       BARRA DE PROGRESO
    ============================================ */
    .area-progreso {
      margin: 0.5rem 0 0.75rem;
    }

    .barra-progreso {
      position: relative;
      width: 100%;
      height: 6px;
      background: var(--progreso-bg);
      border-radius: 3px;
      cursor: pointer;
    }

    .relleno-progreso {
      height: 100%;
      background: linear-gradient(90deg, var(--acento), var(--acento-hover));
      border-radius: 3px;
      width: 0%;
      transition: width 0.1s linear;
      position: relative;
    }

    .relleno-progreso::after {
      content: '';
      position: absolute;
      right: -6px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .barra-progreso:hover .relleno-progreso::after,
    .barra-progreso:active .relleno-progreso::after {
      opacity: 1;
    }

    .tiempos {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 4px;
      font-variant-numeric: tabular-nums;
      font-family: 'SF Mono', 'Consolas', monospace;
    }

    /* ============================================
       BOTONES PRINCIPALES
    ============================================ */
    .controles {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin: 0.5rem 0 0.75rem;
    }

    .btn-control {
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      font-size: 1.5rem;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transicion);
    }

    .btn-control:hover {
      background: rgba(255,255,255,0.06);
      transform: scale(1.1);
    }

    .btn-control:active {
      transform: scale(0.92);
      background: rgba(255,255,255,0.12);
    }

    .btn-play {
      width: 56px;
      height: 56px;
      font-size: 1.8rem;
      background: var(--acento);
      color: #fff;
      box-shadow: 0 6px 20px rgba(124,92,252,0.45);
    }

    .btn-play:hover {
      background: var(--acento-hover);
      box-shadow: 0 8px 26px rgba(124,92,252,0.65);
      transform: scale(1.08);
    }

    .btn-control.activo {
      color: var(--acento);
    }

    /* ============================================
       CONTROL DE VOLUMEN
    ============================================ */
    .volumen-area {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0.25rem 0 0.75rem;
    }

    .icono-volumen {
      font-size: 1.2rem;
      cursor: pointer;
      transition: color 0.2s;
    }

    .deslizador-volumen {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 5px;
      border-radius: 3px;
      background: var(--progreso-bg);
      outline: none;
      cursor: pointer;
    }

    .deslizador-volumen::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
      cursor: pointer;
      transition: transform 0.15s;
    }

    /* ============================================
       PLAYLIST
    ============================================ */
    .seccion-playlist {
      border-top: 1px solid rgba(255,255,255,0.06);
      margin-top: 0.5rem;
      padding-top: 0.75rem;
    }

    .encabezado-playlist {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    .contenedor-playlist {
      max-height: 220px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--progreso-bg) transparent;
      border-radius: var(--radio-sm);
      padding-right: 4px;
    }

    .contenedor-playlist::-webkit-scrollbar {
      width: 4px;
    }
    .contenedor-playlist::-webkit-scrollbar-track {
      background: transparent;
    }
    .contenedor-playlist::-webkit-scrollbar-thumb {
      background: var(--progreso-bg);
      border-radius: 2px;
    }

    .item-playlist {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: var(--radio-sm);
      cursor: pointer;
      transition: background 0.2s;
    }

    .item-playlist:hover {
      background: rgba(255,255,255,0.03);
    }

    .item-playlist.actual {
      background: rgba(124,92,252,0.12);
    }

    .item-playlist .num-cancion {
      width: 24px;
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-secondary);
      flex-shrink: 0;
    }

    .item-playlist.actual .num-cancion {
      color: var(--acento);
      font-weight: bold;
    }

    .item-playlist .miniatura {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      object-fit: cover;
      background: var(--surface2);
    }

    .item-playlist .miniatura-placeholder {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      background: linear-gradient(135deg, #2a1a5e, #1a1050);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    .item-playlist .info-item {
      flex: 1;
      min-width: 0;
    }

    .item-playlist .titulo-item {
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-playlist.actual .titulo-item {
      color: var(--acento);
    }

    .item-playlist .artista-item {
      font-size: 0.72rem;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Indicador de reproducción en la playlist */
    .item-playlist .indicador-play {
      display: none;
      width: 24px;
      height: 14px;
      justify-content: center;
      align-items: flex-end;
      gap: 2px;
    }

    .item-playlist.actual.reproduciendo .indicador-play {
      display: flex;
    }

    .item-playlist.actual.reproduciendo .num-cancion {
      display: none;
    }

    .barrita {
      width: 3px;
      background: var(--acento);
      border-radius: 1px;
      animation: barrita-anim 0.6s ease-in-out infinite alternate;
    }

    @keyframes barrita-anim {
      to { height: 4px; }
    }

    /* ============================================
       RESPONSIVE
    ============================================ */
    @media (max-width: 480px) {
      .reproductor {
        padding: 1.5rem 1rem 1rem;
        border-radius: 20px;
        max-width: 100%;
      }
      .contenedor-portada {
        width: 140px;
        height: 140px;
      }
      .portada-placeholder {
        font-size: 3rem;
      }
      .btn-control {
        width: 38px;
        height: 38px;
        font-size: 1.3rem;
      }
      .btn-play {
        width: 48px;
        height: 48px;
        font-size: 1.5rem;
      }
      .contenedor-playlist {
        max-height: 160px;
      }
    }
  </style>
</head>
<body>

  <!-- ==================== REPRODUCTOR ==================== -->
  <div class="reproductor" id="reproductor">
    <!-- Portada con anillo giratorio -->
    <div class="contenedor-portada">
      <div class="anillo-portada"></div>
      <div id="vistaPortada">
        <div class="portada-placeholder">🎵</div>
      </div>
    </div>

    <!-- Ecualizador animado -->
    <div class="ecualizador" id="ecualizador">
      <div class="barra-eq" style="height:6px"></div>
      <div class="barra-eq" style="height:12px"></div>
      <div class="barra-eq" style="height:18px"></div>
      <div class="barra-eq" style="height:10px"></div>
      <div class="barra-eq" style="height:15px"></div>
      <div class="barra-eq" style="height:8px"></div>
      <div class="barra-eq" style="height:14px"></div>
    </div>

    <!-- Información de la canción actual -->
    <div class="info-cancion" id="infoCancion">
      <div class="sin-cancion">Cargando lista de reproducción...</div>
    </div>

    <!-- Barra de progreso -->
    <div class="area-progreso">
      <div class="barra-progreso" id="barraProgreso">
        <div class="relleno-progreso" id="rellenoProgreso"></div>
      </div>
      <div class="tiempos">
        <span id="tiempoActual">0:00</span>
        <span id="tiempoTotal">--:--</span>
      </div>
    </div>

    <!-- Controles principales -->
    <div class="controles">
      <button class="btn-control" id="btnAleatorio" title="Aleatorio" aria-label="Modo aleatorio">
        🔀
      </button>
      <button class="btn-control" id="btnAnterior" title="Anterior" aria-label="Canción anterior">
        ⏮
      </button>
      <button class="btn-control btn-play" id="btnPlay" title="Reproducir" aria-label="Reproducir o pausar">
        ▶
      </button>
      <button class="btn-control" id="btnSiguiente" title="Siguiente" aria-label="Canción siguiente">
        ⏭
      </button>
      <button class="btn-control" id="btnRepetir" title="Repetición" aria-label="Modo de repetición">
        🔁
      </button>
    </div>

    <!-- Volumen -->
    <div class="volumen-area">
      <span class="icono-volumen" id="iconoVolumen" title="Silenciar">🔊</span>
      <input type="range" class="deslizador-volumen" id="deslizadorVolumen" min="0" max="100" value="80" aria-label="Control de volumen">
    </div>

    <!-- Playlist -->
    <div class="seccion-playlist">
      <div class="encabezado-playlist">📋 Lista de reproducción</div>
      <div class="contenedor-playlist" id="contenedorPlaylist">
        <div class="sin-cancion" style="padding: 1.5rem; text-align: center;">
          📁 No se encontraron canciones.<br>
          <small>Añade archivos .mp3 en la carpeta <code>music/</code> y ejecuta <code>node generate-playlist.js</code></small>
        </div>
      </div>
    </div>
  </div>

  <!-- Carga el archivo de playlist generado -->
  <script src="playlist.js"></script>

  <script>
    // ============================================
    // LÓGICA DEL REPRODUCTOR (ES6, bien comentado)
    // ============================================

    (function() {
      // ---------- REFERENCIAS AL DOM ----------
      const reproductor = document.getElementById('reproductor');
      const vistaPortada = document.getElementById('vistaPortada');
      const infoCancion = document.getElementById('infoCancion');
      const barraProgreso = document.getElementById('barraProgreso');
      const rellenoProgreso = document.getElementById('rellenoProgreso');
      const tiempoActualEl = document.getElementById('tiempoActual');
      const tiempoTotalEl = document.getElementById('tiempoTotal');
      const btnPlay = document.getElementById('btnPlay');
      const btnAnterior = document.getElementById('btnAnterior');
      const btnSiguiente = document.getElementById('btnSiguiente');
      const btnAleatorio = document.getElementById('btnAleatorio');
      const btnRepetir = document.getElementById('btnRepetir');
      const deslizadorVolumen = document.getElementById('deslizadorVolumen');
      const iconoVolumen = document.getElementById('iconoVolumen');
      const contenedorPlaylist = document.getElementById('contenedorPlaylist');
      const ecualizador = document.getElementById('ecualizador');
      const barrasEq = ecualizador.querySelectorAll('.barra-eq');

      // ---------- ESTADO INTERNO ----------
      let playlist = [];               // array de objetos {file, title, artist, cover}
      let indiceActual = -1;          // índice en playlist (fuera de modo aleatorio)
      let reproduciendo = false;
      let modoAleatorio = false;
      let modoRepeticion = 0;         // 0: sin repetición, 1: repetir todas, 2: repetir una
      let ordenAleatorio = [];        // índices de la playlist en modo shuffle
      let posicionAleatoria = 0;      // posición actual dentro de ordenAleatorio

      let audio = null;
      let intervaloEq = null;
      let arrastrandoBarra = false;   // para la barra de progreso

      // ---------- FUNCIONES AUXILIARES ----------

      /** Formatea segundos a m:ss */
      function formatearTiempo(segundos) {
        if (!isFinite(segundos) || segundos < 0) return '--:--';
        const min = Math.floor(segundos / 60);
        const sec = Math.floor(segundos % 60);
        return `${min}:${sec.toString().padStart(2, '0')}`;
      }

      /** Escapa HTML para insertar texto de forma segura */
      function escaparHTML(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      // ---------- ACTUALIZACIÓN DE LA INTERFAZ ----------

      function actualizarPortada(cancion) {
        if (cancion && cancion.cover && cancion.cover.trim() !== '') {
          vistaPortada.innerHTML = `<img class="portada" src="${escaparHTML(cancion.cover)}" alt="Portada del álbum" onerror="this.style.display='none';this.parentElement.innerHTML='<div class=\\'portada-placeholder\\'>🎵</div>'">`;
        } else {
          vistaPortada.innerHTML = '<div class="portada-placeholder">🎵</div>';
        }
      }

      function actualizarInfoCancion(cancion) {
        const titulo = cancion ? escaparHTML(cancion.title || 'Sin título') : '';
        const artista = cancion ? escaparHTML(cancion.artist || 'Artista desconocido') : '';
        infoCancion.innerHTML = `
          <div class="titulo-cancion" title="${titulo}">${titulo}</div>
          <div class="artista-cancion" title="${artista}">${artista}</div>
        `;
      }

      function actualizarBotonPlay() {
        btnPlay.textContent = reproduciendo ? '⏸' : '▶';
      }

      function actualizarIconoVolumen() {
        const vol = audio ? audio.volume : 0.8;
        if (vol === 0) iconoVolumen.textContent = '🔇';
        else if (vol < 0.33) iconoVolumen.textContent = '🔈';
        else if (vol < 0.66) iconoVolumen.textContent = '🔉';
        else iconoVolumen.textContent = '🔊';
      }

      function actualizarClaseReproduciendo() {
        if (reproduciendo) {
          reproductor.classList.add('reproduciendo');
        } else {
          reproductor.classList.remove('reproduciendo');
        }
      }

      function actualizarResaltadoPlaylist() {
        const items = contenedorPlaylist.querySelectorAll('.item-playlist');
        items.forEach(item => {
          const idx = parseInt(item.getAttribute('data-indice'));
          item.classList.toggle('actual', idx === indiceActual);
          item.classList.toggle('reproduciendo', idx === indiceActual && reproduciendo);
        });

        // Desplazar hasta la canción actual si es necesario
        const actual = contenedorPlaylist.querySelector('.item-playlist.actual');
        if (actual) {
          actual.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
      }

      // ---------- ECUALIZADOR (animación aleatoria) ----------
      function iniciarEcualizador() {
        if (intervaloEq) return;
        intervaloEq = setInterval(() => {
          barrasEq.forEach(bar => {
            bar.style.height = Math.floor(Math.random() * 18 + 4) + 'px';
          });
        }, 150);
      }

      function detenerEcualizador() {
        if (intervaloEq) {
          clearInterval(intervaloEq);
          intervaloEq = null;
        }
        barrasEq.forEach(bar => bar.style.height = '4px');
      }

      // ---------- CONTROL DE REPRODUCCIÓN ----------
      function reproducir() {
        if (!audio || !audio.src || audio.src === window.location.href) return;
        const promesa = audio.play();
        if (promesa?.catch) {
          promesa.catch(err => {
            console.warn('Error al reproducir:', err.message);
            // Si fue bloqueado por el navegador, actualizamos estado
            reproduciendo = false;
            actualizarBotonPlay();
            actualizarClaseReproduciendo();
            detenerEcualizador();
          });
        }
      }

      function pausar() {
        if (audio) audio.pause();
      }

      function alternarPlay() {
        if (indiceActual < 0) {
          if (playlist.length > 0) cargarCancion(0, true);
          return;
        }
        if (reproduciendo) {
          pausar();
        } else {
          reproducir();
        }
        // Los eventos 'play' y 'pause' de audio actualizarán el estado
      }

      // ---------- CARGA DE CANCIÓN ----------
      function cargarCancion(indice, reproducirAuto = false) {
        if (indice < 0 || indice >= playlist.length) {
          console.warn('Índice fuera de rango');
          return;
        }
        indiceActual = indice;
        const cancion = playlist[indice];

        // Actualizar posición en modo aleatorio
        if (modoAleatorio) {
          const pos = ordenAleatorio.indexOf(indice);
          if (pos !== -1) posicionAleatoria = pos;
          else {
            // Si no está, regeneramos orden y ponemos esta al frente
            generarOrdenAleatorio(indice);
            posicionAleatoria = 0;
          }
        }

        if (!audio) {
          audio = new Audio();
          configurarEventosAudio();
        }

        audio.src = cancion.file;
        audio.load();

        // Actualizar interfaz
        actualizarPortada(cancion);
        actualizarInfoCancion(cancion);
        rellenoProgreso.style.width = '0%';
        tiempoActualEl.textContent = '0:00';
        tiempoTotalEl.textContent = '--:--';
        actualizarBotonPlay();
        actualizarClaseReproduciendo();
        actualizarResaltadoPlaylist();

        if (reproducirAuto) {
          // Forzar estado a 'reproduciendo' antes de play
          // El evento 'play' lo confirmará, pero si falla se corregirá
          reproduciendo = true;
          actualizarBotonPlay();
          actualizarClaseReproduciendo();
          iniciarEcualizador();
          reproducir();
        } else {
          // Si estaba reproduciendo, detener todo
          if (reproduciendo) {
            reproduciendo = false;
            actualizarBotonPlay();
            actualizarClaseReproduciendo();
            detenerEcualizador();
          }
        }
      }

      // ---------- EVENTOS DEL OBJETO AUDIO ----------
      function configurarEventosAudio() {
        audio.addEventListener('loadedmetadata', () => {
          if (isFinite(audio.duration)) {
            tiempoTotalEl.textContent = formatearTiempo(audio.duration);
          }
        });

        audio.addEventListener('timeupdate', () => {
          if (!arrastrandoBarra && audio.duration) {
            const porcentaje = (audio.currentTime / audio.duration) * 100;
            rellenoProgreso.style.width = porcentaje + '%';
            tiempoActualEl.textContent = formatearTiempo(audio.currentTime);
          }
        });

        audio.addEventListener('play', () => {
          reproduciendo = true;
          actualizarBotonPlay();
          actualizarClaseReproduciendo();
          iniciarEcualizador();
          actualizarResaltadoPlaylist();
        });

        audio.addEventListener('pause', () => {
          reproduciendo = false;
          actualizarBotonPlay();
          actualizarClaseReproduciendo();
          detenerEcualizador();
          actualizarResaltadoPlaylist();
        });

        audio.addEventListener('ended', () => {
          manejarFinCancion();
        });

        audio.addEventListener('error', () => {
          console.error(`Error al cargar: ${playlist[indiceActual]?.file}`);
          // Intentar siguiente canción si hay más de una
          if (playlist.length > 1) {
            setTimeout(() => manejarFinCancion(), 300);
          } else {
            pausar();
            audio.currentTime = 0;
            reproduciendo = false;
            actualizarBotonPlay();
            actualizarClaseReproduciendo();
            detenerEcualizador();
          }
        });
      }

      function manejarFinCancion() {
        if (modoRepeticion === 2) {
          // Repetir la misma canción
          if (audio) {
            audio.currentTime = 0;
            reproducir();
          }
        } else if (modoRepeticion === 1 || modoAleatorio) {
          // Repetir toda la lista (o modo aleatorio)
          siguienteCancion();
        } else {
          // Sin repetición: pasar a siguiente o detener si es la última
          if (modoAleatorio) {
            if (posicionAleatoria >= ordenAleatorio.length - 1) {
              // Fin de la lista aleatoria
              pausar();
              audio.currentTime = 0;
              rellenoProgreso.style.width = '0%';
              tiempoActualEl.textContent = '0:00';
              reproduciendo = false;
              actualizarBotonPlay();
              actualizarClaseReproduciendo();
              detenerEcualizador();
            } else {
              siguienteCancion();
            }
          } else {
            if (indiceActual >= playlist.length - 1) {
              pausar();
              audio.currentTime = 0;
              rellenoProgreso.style.width = '0%';
              tiempoActualEl.textContent = '0:00';
              reproduciendo = false;
              actualizarBotonPlay();
              actualizarClaseReproduciendo();
              detenerEcualizador();
            } else {
              siguienteCancion();
            }
          }
        }
      }

      // ---------- NAVEGACIÓN ENTRE CANCIONES ----------
      function siguienteCancion() {
        if (playlist.length === 0) return;
        let siguienteIndice;
        if (modoAleatorio) {
          posicionAleatoria++;
          if (posicionAleatoria >= ordenAleatorio.length) {
            generarOrdenAleatorio();
            posicionAleatoria = 0;
          }
          siguienteIndice = ordenAleatorio[posicionAleatoria];
        } else {
          siguienteIndice = indiceActual + 1;
          if (siguienteIndice >= playlist.length) siguienteIndice = 0;
        }
        cargarCancion(siguienteIndice, true);
      }

      function anteriorCancion() {
        if (playlist.length === 0) return;
        // Si la canción lleva más de 3 segundos, reiniciarla
        if (audio && audio.currentTime > 3) {
          audio.currentTime = 0;
          if (!reproduciendo) reproducir();
          return;
        }

        let anteriorIndice;
        if (modoAleatorio) {
          posicionAleatoria--;
          if (posicionAleatoria < 0) posicionAleatoria = ordenAleatorio.length - 1;
          anteriorIndice = ordenAleatorio[posicionAleatoria];
        } else {
          anteriorIndice = indiceActual - 1;
          if (anteriorIndice < 0) anteriorIndice = playlist.length - 1;
        }
        cargarCancion(anteriorIndice, true);
      }

      // ---------- MODO ALEATORIO ----------
      function alternarAleatorio() {
        modoAleatorio = !modoAleatorio;
        if (modoAleatorio) {
          generarOrdenAleatorio(indiceActual >= 0 ? indiceActual : undefined);
          btnAleatorio.classList.add('activo');
        } else {
          ordenAleatorio = [];
          btnAleatorio.classList.remove('activo');
        }
      }

      function generarOrdenAleatorio(indicePrioritario) {
        ordenAleatorio = playlist.map((_, i) => i);
        // Algoritmo Fisher-Yates
        for (let i = ordenAleatorio.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [ordenAleatorio[i], ordenAleatorio[j]] = [ordenAleatorio[j], ordenAleatorio[i]];
        }
        // Si hay un índice prioritario (canción actual), ubicarlo al principio
        if (indicePrioritario !== undefined && ordenAleatorio.includes(indicePrioritario)) {
          const pos = ordenAleatorio.indexOf(indicePrioritario);
          ordenAleatorio.splice(pos, 1);
          ordenAleatorio.unshift(indicePrioritario);
        }
        posicionAleatoria = 0;
      }

      // ---------- MODO REPETICIÓN ----------
      function alternarRepeticion() {
        modoRepeticion = (modoRepeticion + 1) % 3;
        const simbolos = ['🔁', '🔁', '🔂'];
        btnRepetir.textContent = simbolos[modoRepeticion];
        btnRepetir.classList.toggle('activo', modoRepeticion >= 1);
        if (modoRepeticion === 2) {
          btnRepetir.style.color = 'var(--acento)';
        } else {
          btnRepetir.style.color = '';
        }
      }

      // ---------- CONTROL DE VOLUMEN ----------
      function cambiarVolumen(valor) {
        const vol = valor / 100;
        if (audio) audio.volume = vol;
        localStorage.setItem('reproductor-volumen', vol);
        actualizarIconoVolumen();
      }

      function alternarSilencio() {
        if (!audio) return;
        if (audio.volume > 0) {
          audio._ultimoVolumen = audio.volume;
          audio.volume = 0;
          deslizadorVolumen.value = 0;
        } else {
          const vol = audio._ultimoVolumen || 0.8;
          audio.volume = vol;
          deslizadorVolumen.value = Math.round(vol * 100);
        }
        localStorage.setItem('reproductor-volumen', audio.volume);
        actualizarIconoVolumen();
      }

      // ---------- BARRA DE PROGRESO ----------
      function adelantarDesdeEvento(e) {
        if (!audio || !audio.duration) return;
        const rect = barraProgreso.getBoundingClientRect();
        const x = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
        const porcentaje = x / rect.width;
        audio.currentTime = porcentaje * audio.duration;
        rellenoProgreso.style.width = (porcentaje * 100) + '%';
        tiempoActualEl.textContent = formatearTiempo(audio.currentTime);
      }

      // ---------- CONSTRUIR LA PLAYLIST EN EL DOM ----------
      function renderizarPlaylist() {
        if (playlist.length === 0) {
          contenedorPlaylist.innerHTML = `
            <div class="sin-cancion" style="padding: 1.5rem; text-align: center;">
              📁 No se encontraron canciones.<br>
              <small>Añade archivos .mp3 en la carpeta <code>music/</code> y ejecuta <code>node generate-playlist.js</code></small>
            </div>`;
          return;
        }

        let html = '';
        playlist.forEach((cancion, i) => {
          const tienePortada = cancion.cover && cancion.cover.trim() !== '';
          const miniaturaHTML = tienePortada
            ? `<img class="miniatura" src="${escaparHTML(cancion.cover)}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">`
              + `<div class="miniatura-placeholder" style="display:none;">🎵</div>`
            : `<div class="miniatura-placeholder">🎵</div>`;
          html += `
            <div class="item-playlist" data-indice="${i}" onclick="window._seleccionarCancion(${i})">
              <span class="num-cancion">${i+1}</span>
              <span class="indicador-play">
                <span class="barrita" style="height:8px; animation-delay:0s"></span>
                <span class="barrita" style="height:14px; animation-delay:0.1s"></span>
                <span class="barrita" style="height:10px; animation-delay:0.2s"></span>
                <span class="barrita" style="height:6px; animation-delay:0.3s"></span>
              </span>
              ${miniaturaHTML}
              <div class="info-item">
                <div class="titulo-item">${escaparHTML(cancion.title || 'Sin título')}</div>
                <div class="artista-item">${escaparHTML(cancion.artist || 'Desconocido')}</div>
              </div>
            </div>`;
        });
        contenedorPlaylist.innerHTML = html;
        actualizarResaltadoPlaylist();
      }

      // Función pública para usar desde el onclick de la playlist
      window._seleccionarCancion = function(indice) {
        if (indice === indiceActual) {
          alternarPlay();
          return;
        }
        cargarCancion(indice, true);
      };

      // ---------- INICIALIZACIÓN GENERAL ----------
      function inicializar() {
        // Cargar playlist desde el archivo playlist.js (variable PLAYLIST)
        if (typeof PLAYLIST !== 'undefined' && Array.isArray(PLAYLIST) && PLAYLIST.length > 0) {
          playlist = PLAYLIST.filter(c => c.file && c.file.trim() !== '');
        } else {
          playlist = [];
        }

        renderizarPlaylist();

        if (playlist.length === 0) {
          infoCancion.innerHTML = '<div class="sin-cancion">No hay canciones disponibles</div>';
          // Deshabilitar controles si se desea (opcional)
          return;
        }

        // Crear el objeto Audio y configurar eventos
        audio = new Audio();
        configurarEventosAudio();

        // Recuperar volumen guardado
        const volGuardado = localStorage.getItem('reproductor-volumen');
        if (volGuardado !== null) {
          const vol = parseFloat(volGuardado);
          audio.volume = vol;
          deslizadorVolumen.value = Math.round(vol * 100);
        } else {
          audio.volume = 0.8;
          deslizadorVolumen.value = 80;
        }
        actualizarIconoVolumen();

        // Cargar primera canción sin reproducir
        cargarCancion(0, false);

        // Configurar eventos de los botones y teclado
        configurarEventosUI();
        configurarAtajosTeclado();
      }

      function configurarEventosUI() {
        btnPlay.addEventListener('click', alternarPlay);
        btnSiguiente.addEventListener('click', siguienteCancion);
        btnAnterior.addEventListener('click', anteriorCancion);
        btnAleatorio.addEventListener('click', alternarAleatorio);
        btnRepetir.addEventListener('click', alternarRepeticion);

        deslizadorVolumen.addEventListener('input', (e) => {
          cambiarVolumen(parseInt(e.target.value));
        });
        iconoVolumen.addEventListener('click', alternarSilencio);

        // Barra de progreso (ratón y táctil)
        barraProgreso.addEventListener('mousedown', (e) => {
          arrastrandoBarra = true;
          adelantarDesdeEvento(e);
        });
        document.addEventListener('mousemove', (e) => {
          if (arrastrandoBarra) adelantarDesdeEvento(e);
        });
        document.addEventListener('mouseup', () => {
          arrastrandoBarra = false;
        });

        barraProgreso.addEventListener('touchstart', (e) => {
          arrastrandoBarra = true;
          adelantarDesdeEvento(e.touches[0]);
        });
        document.addEventListener('touchmove', (e) => {
          if (arrastrandoBarra && e.touches.length > 0) adelantarDesdeEvento(e.touches[0]);
        });
        document.addEventListener('touchend', () => {
          arrastrandoBarra = false;
        });
      }

      function configurarAtajosTeclado() {
        document.addEventListener('keydown', (e) => {
          // No actuar si estamos escribiendo en un input
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;

          switch (e.code) {
            case 'Space':
              e.preventDefault();
              alternarPlay();
              break;
            case 'ArrowLeft':
              e.preventDefault();
              if (audio) audio.currentTime = Math.max(0, audio.currentTime - 10);
              break;
            case 'ArrowRight':
              e.preventDefault();
              if (audio && audio.duration) audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
              break;
            case 'ArrowUp':
              e.preventDefault();
              deslizadorVolumen.value = Math.min(100, parseInt(deslizadorVolumen.value) + 5);
              cambiarVolumen(parseInt(deslizadorVolumen.value));
              break;
            case 'ArrowDown':
              e.preventDefault();
              deslizadorVolumen.value = Math.max(0, parseInt(deslizadorVolumen.value) - 5);
              cambiarVolumen(parseInt(deslizadorVolumen.value));
              break;
            case 'KeyN':
              e.preventDefault();
              siguienteCancion();
              break;
            case 'KeyP':
              e.preventDefault();
              anteriorCancion();
              break;
            case 'KeyS':
              e.preventDefault();
              alternarAleatorio();
              break;
            case 'KeyR':
              e.preventDefault();
              alternarRepeticion();
              break;
            case 'KeyM':
              e.preventDefault();
              alternarSilencio();
              break;
          }
        });
      }

      // Arrancar la aplicación
      inicializar();
    })();
  </script>
</body>
</html>
