<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 Music Player</title>

    <!-- Estilos CSS -->
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #14141f;
            --surface2: #1c1c2a;
            --text: #e8e8f0;
            --text2: #9a9ab0;
            --accent: #7c5cfc;
            --accent2: #5b3cfc;
            --progress-bg: #2a2a3a;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            --radius: 18px;
            --radius-sm: 10px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 50% 20%, rgba(124, 92, 252, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 80%, rgba(92, 60, 252, 0.06) 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ===== Reproductor ===== */
        .player {
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 28px 24px 20px;
            width: 100%;
            max-width: 440px;
            box-shadow: var(--shadow), 0 0 80px rgba(124, 92, 252, 0.08);
            backdrop-filter: blur(4px);
            transition: all var(--transition);
        }

        /* ===== Zona de portada ===== */
        .cover-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            border-radius: 50%;
        }

        /* Anillo giratorio tipo vinilo */
        .cover-ring {
            position: absolute;
            inset: -14px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: var(--accent);
            border-right-color: var(--accent);
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }
        .player.playing .cover-ring {
            opacity: 1;
            animation: ringSpin 4s linear infinite;
        }
        @keyframes ringSpin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Portada */
        .cover {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            transition: transform var(--transition);
            background: var(--surface2);
        }
        .player.playing .cover {
            animation: coverPulse 3s ease-in-out infinite;
        }
        @keyframes coverPulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.03);
            }
        }

        /* Placeholder sin portada */
        .cover-placeholder {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2a1a5e, #1a1050, #1e1a3a);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        }
        .cover-placeholder .icon {
            font-size: 70px;
            opacity: 0.7;
        }

        /* ===== Ecualizador ===== */
        .equalizer {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 4px;
            height: 24px;
            margin: 8px auto 0;
            opacity: 0.4;
            transition: opacity 0.4s;
        }
        .player.playing .equalizer {
            opacity: 0.9;
        }
        .eq-bar {
            width: 4px;
            border-radius: 2px;
            background: var(--accent);
            transition: height 0.15s ease;
            min-height: 3px;
        }

        /* ===== Info canción ===== */
        .song-info {
            text-align: center;
            margin: 10px 0 16px;
            min-height: 50px;
        }
        .song-title {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text);
        }
        .song-artist {
            font-size: 0.9rem;
            color: var(--text2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .no-song {
            color: var(--text2);
            font-style: italic;
            padding: 10px 0;
        }

        /* ===== Barra de progreso ===== */
        .progress-area {
            margin: 6px 0 10px;
        }
        .progress-bar {
            position: relative;
            width: 100%;
            height: 6px;
            background: var(--progress-bg);
            border-radius: 3px;
            cursor: pointer;
            overflow: visible;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s linear;
            position: relative;
        }
        .progress-fill::after {
            content: '';
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            width: 14px;
            height: 14px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .progress-bar:hover .progress-fill::after {
            opacity: 1;
        }
        .progress-bar:active .progress-fill::after {
            opacity: 1;
            transform: translateY(-50%) scale(1.2);
        }

        .time-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text2);
            margin-top: 4px;
            font-variant-numeric: tabular-nums;
            font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
        }

        /* ===== Controles principales ===== */
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            margin: 8px 0 6px;
        }
        .ctrl-btn {
            background: none;
            border: none;
            color: var(--text);
            cursor: pointer;
            font-size: 1.3rem;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            position: relative;
        }
        .ctrl-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: scale(1.08);
        }
        .ctrl-btn:active {
            transform: scale(0.93);
            background: rgba(255, 255, 255, 0.1);
        }
        .ctrl-btn.play-btn {
            width: 58px;
            height: 58px;
            font-size: 1.6rem;
            background: var(--accent);
            color: #fff;
            box-shadow: 0 6px 20px rgba(124, 92, 252, 0.45);
        }
        .ctrl-btn.play-btn:hover {
            background: var(--accent2);
            box-shadow: 0 8px 28px rgba(124, 92, 252, 0.6);
            transform: scale(1.06);
        }
        .ctrl-btn.play-btn:active {
            transform: scale(0.94);
        }
        .ctrl-btn.active {
            color: var(--accent);
        }
        .ctrl-btn .tooltip {
            position: absolute;
            bottom: -24px;
            background: #000;
            color: #fff;
            font-size: 0.65rem;
            padding: 3px 8px;
            border-radius: 4px;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .ctrl-btn:hover .tooltip {
            opacity: 1;
        }

        /* ===== Volumen ===== */
        .volume-area {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 4px 0 10px;
            padding: 0 10px;
        }
        .volume-icon {
            font-size: 1.1rem;
            color: var(--text2);
            flex-shrink: 0;
            cursor: pointer;
            transition: color 0.2s;
        }
        .volume-icon:hover {
            color: var(--text);
        }
        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            flex: 1;
            height: 5px;
            border-radius: 3px;
            background: var(--progress-bg);
            outline: none;
            cursor: pointer;
            accent-color: var(--accent);
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
            transition: transform 0.15s;
        }
        .volume-slider::-webkit-slider-thumb:active {
            transform: scale(1.25);
        }

        /* ===== Playlist ===== */
        .playlist-section {
            margin-top: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding-top: 10px;
        }
        .playlist-header {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text2);
            margin-bottom: 8px;
            padding: 0 4px;
        }
        .playlist-container {
            max-height: 240px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--progress-bg) transparent;
            border-radius: var(--radius-sm);
        }
        .playlist-container::-webkit-scrollbar {
            width: 4px;
        }
        .playlist-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .playlist-container::-webkit-scrollbar-thumb {
            background: var(--progress-bg);
            border-radius: 2px;
        }
        .playlist-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .playlist-item:hover {
            background: rgba(255, 255, 255, 0.03);
        }
        .playlist-item.current {
            background: rgba(124, 92, 252, 0.12);
        }
        .playlist-item .pl-index {
            width: 24px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text2);
            flex-shrink: 0;
        }
        .playlist-item.current .pl-index {
            color: var(--accent);
            font-weight: 700;
        }
        .playlist-item .pl-cover {
            width: 38px;
            height: 38px;
            border-radius: 6px;
            object-fit: cover;
            flex-shrink: 0;
            background: var(--surface2);
        }
        .playlist-item .pl-cover-placeholder {
            width: 38px;
            height: 38px;
            border-radius: 6px;
            flex-shrink: 0;
            background: linear-gradient(135deg, #2a1a5e, #1a1050);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .playlist-item .pl-info {
            flex: 1;
            min-width: 0;
        }
        .playlist-item .pl-title {
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text);
        }
        .playlist-item.current .pl-title {
            color: var(--accent);
        }
        .playlist-item .pl-artist {
            font-size: 0.72rem;
            color: var(--text2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .playlist-item .pl-playing-indicator {
            display: none;
            gap: 2px;
            align-items: flex-end;
            height: 14px;
        }
        .playlist-item.current.playing .pl-playing-indicator {
            display: flex;
        }
        .playlist-item.current.playing .pl-index {
            display: none;
        }
        .pl-bar-sm {
            width: 3px;
            background: var(--accent);
            border-radius: 1px;
            animation: plBarAnim 0.6s ease-in-out infinite alternate;
        }
        .pl-bar-sm:nth-child(1) {
            height: 6px;
            animation-delay: 0s;
        }
        .pl-bar-sm:nth-child(2) {
            height: 12px;
            animation-delay: 0.15s;
        }
        .pl-bar-sm:nth-child(3) {
            height: 8px;
            animation-delay: 0.3s;
        }
        .pl-bar-sm:nth-child(4) {
            height: 14px;
            animation-delay: 0.1s;
        }
        @keyframes plBarAnim {
            to {
                height: 3px;
            }
        }

        /* ===== Mensaje vacío ===== */
        .empty-message {
            text-align: center;
            padding: 30px 20px;
            color: var(--text2);
            font-size: 0.9rem;
            line-height: 1.6;
        }
        .empty-message .emoji {
            font-size: 3rem;
            display: block;
            margin-bottom: 10px;
        }
        .empty-message code {
            background: var(--surface2);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            color: var(--accent);
        }

        /* ===== Responsive ===== */
        @media (max-width: 480px) {
            .player {
                padding: 20px 16px 16px;
                border-radius: 20px;
                max-width: 100%;
            }
            .cover-container {
                width: 150px;
                height: 150px;
                margin-bottom: 14px;
            }
            .cover-ring {
                inset: -10px;
                border-width: 2px;
            }
            .cover-placeholder .icon {
                font-size: 50px;
            }
            .song-title {
                font-size: 1.1rem;
            }
            .controls {
                gap: 10px;
            }
            .ctrl-btn {
                width: 38px;
                height: 38px;
                font-size: 1.1rem;
            }
            .ctrl-btn.play-btn {
                width: 50px;
                height: 50px;
                font-size: 1.4rem;
            }
            .playlist-container {
                max-height: 180px;
            }
        }
    </style>
</head>
<body>

    <!-- ==================== REPRODUCTOR ==================== -->
    <div class="player" id="player">
        <!-- Portada + anillo -->
        <div class="cover-container" id="coverContainer">
            <div class="cover-ring"></div>
            <div id="coverDisplay">
                <div class="cover-placeholder">
                    <span class="icon">🎵</span>
                </div>
            </div>
        </div>

        <!-- Equalizer animado -->
        <div class="equalizer" id="equalizer">
            <div class="eq-bar" style="height:6px"></div>
            <div class="eq-bar" style="height:12px"></div>
            <div class="eq-bar" style="height:18px"></div>
            <div class="eq-bar" style="height:10px"></div>
            <div class="eq-bar" style="height:15px"></div>
            <div class="eq-bar" style="height:8px"></div>
            <div class="eq-bar" style="height:14px"></div>
        </div>

        <!-- Info canción -->
        <div class="song-info" id="songInfo">
            <div class="no-song">Cargando playlist...</div>
        </div>

        <!-- Barra progreso -->
        <div class="progress-area">
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-row">
                <span id="currentTime">0:00</span>
                <span id="totalTime">0:00</span>
            </div>
        </div>

        <!-- Controles -->
        <div class="controls">
            <button class="ctrl-btn" id="btnShuffle" title="Aleatorio" aria-label="Aleatorio">
                🔀<span class="tooltip">Aleatorio</span>
            </button>
            <button class="ctrl-btn" id="btnPrev" title="Anterior" aria-label="Anterior">
                ⏮<span class="tooltip">Anterior</span>
            </button>
            <button class="ctrl-btn play-btn" id="btnPlay" title="Reproducir" aria-label="Reproducir">
                ▶
            </button>
            <button class="ctrl-btn" id="btnNext" title="Siguiente" aria-label="Siguiente">
                ⏭<span class="tooltip">Siguiente</span>
            </button>
            <button class="ctrl-btn" id="btnRepeat" title="Repetición" aria-label="Repetición">
                🔁<span class="tooltip">Sin repetir</span>
            </button>
        </div>

        <!-- Volumen -->
        <div class="volume-area">
            <span class="volume-icon" id="volumeIcon">🔊</span>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80" aria-label="Volumen">
        </div>

        <!-- Playlist -->
        <div class="playlist-section">
            <div class="playlist-header">📋 Lista de reproducción</div>
            <div class="playlist-container" id="playlistContainer">
                <div class="empty-message">
                    <span class="emoji">📁</span>
                    No se encontraron canciones.<br>
                    Edita <code>playlist.js</code> o ejecuta<br>
                    <code>node generate-playlist.js</code>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== SCRIPTS ==================== -->
    <!-- Cargar playlist externa -->
    <script src="playlist.js"></script>

    <!-- Lógica del reproductor -->
    <script>
        (function() {
            // ============ REFERENCIAS DOM ============
            const player = document.getElementById('player');
            const coverContainer = document.getElementById('coverContainer');
            const coverDisplay = document.getElementById('coverDisplay');
            const songInfo = document.getElementById('songInfo');
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            const currentTimeEl = document.getElementById('currentTime');
            const totalTimeEl = document.getElementById('totalTime');
            const btnPlay = document.getElementById('btnPlay');
            const btnPrev = document.getElementById('btnPrev');
            const btnNext = document.getElementById('btnNext');
            const btnShuffle = document.getElementById('btnShuffle');
            const btnRepeat = document.getElementById('btnRepeat');
            const volumeSlider = document.getElementById('volumeSlider');
            const volumeIcon = document.getElementById('volumeIcon');
            const playlistContainer = document.getElementById('playlistContainer');
            const equalizer = document.getElementById('equalizer');
            const eqBars = equalizer.querySelectorAll('.eq-bar');

            // ============ ESTADO ============
            let playlist = [];
            let currentIndex = -1;
            let isPlaying = false;
            let isShuffled = false;
            let repeatMode = 0; // 0: off, 1: all, 2: one
            let shuffleOrder = [];
            let shufflePosition = 0;
            let audio = null;
            let eqInterval = null;
            let dragged = false;

            // ============ INICIALIZACIÓN ============
            function init() {
                // Cargar playlist desde variable global PLAYLIST (definida en playlist.js)
                if (typeof PLAYLIST !== 'undefined' && Array.isArray(PLAYLIST) && PLAYLIST.length > 0) {
                    playlist = PLAYLIST.filter(song => song.file && song.file.trim() !== '');
                    if (playlist.length === 0) {
                        showEmptyMessage('La playlist está vacía. Agrega canciones en playlist.js');
                        return;
                    }
                } else {
                    showEmptyMessage(
                        'No se encontró el archivo playlist.js o está vacío.<br>Ejecuta <code>node generate-playlist.js</code> para generarlo automáticamente.'
                        );
                    return;
                }

                // Crear objeto de audio
                audio = new Audio();
                audio.preload = 'metadata';
                setupAudioEvents();

                // Cargar volumen guardado
                const savedVol = localStorage.getItem('musicPlayer_volume');
                if (savedVol !== null) {
                    audio.volume = parseFloat(savedVol);
                    volumeSlider.value = Math.round(parseFloat(savedVol) * 100);
                } else {
                    audio.volume = 0.8;
                    volumeSlider.value = 80;
                }
                updateVolumeIcon();

                // Renderizar playlist
                renderPlaylist();
                updateShuffleOrder();
                loadSong(0); // Cargar primera canción (no reproducir automáticamente)

                // Eventos
                setupControlEvents();
                setupKeyboardEvents();

                console.log(`🎵 Music Player cargado con ${playlist.length} canción(es).`);
            }

            function showEmptyMessage(msg) {
                songInfo.innerHTML = `<div class="no-song">${msg}</div>`;
            }

            // ============ AUDIO EVENTOS ============
            function setupAudioEvents() {
                audio.addEventListener('loadedmetadata', () => {
                    totalTimeEl.textContent = formatTime(audio.duration || 0);
                    updatePlaylistDurations();
                });

                audio.addEventListener('timeupdate', () => {
                    if (!dragged) {
                        const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
                        progressFill.style.width = pct + '%';
                        currentTimeEl.textContent = formatTime(audio.currentTime);
                    }
                });

                audio.addEventListener('ended', () => {
                    handleSongEnd();
                });

                audio.addEventListener('error', () => {
                    console.warn('Error al cargar:', playlist[currentIndex]?.file);
                    // Intentar siguiente canción
                    setTimeout(() => {
                        if (playlist.length > 1) {
                            handleSongEnd();
                        } else {
                            pauseAudio();
                        }
                    }, 500);
                });

                audio.addEventListener('play', () => {
                    isPlaying = true;
                    updatePlayButton();
                    player.classList.add('playing');
                    startEqualizer();
                    updatePlaylistHighlight();
                });

                audio.addEventListener('pause', () => {
                    isPlaying = false;
                    updatePlayButton();
                    player.classList.remove('playing');
                    stopEqualizer();
                    updatePlaylistHighlight();
                });
            }

            // ============ CARGA DE CANCIÓN ============
            function loadSong(index, autoplay = false) {
                if (index < 0 || index >= playlist.length) {
                    currentIndex = -1;
                    return;
                }
                currentIndex = index;
                const song = playlist[index];

                // Actualizar shuffle position
                if (isShuffled) {
                    shufflePosition = shuffleOrder.indexOf(index);
                    if (shufflePosition === -1) shufflePosition = 0;
                }

                audio.src = song.file;
                audio.load();

                // Actualizar UI
                updateCoverDisplay(song);
                updateSongInfo(song);
                progressFill.style.width = '0%';
                currentTimeEl.textContent = '0:00';
                totalTimeEl.textContent = '--:--';
                updatePlaylistHighlight();
                updatePlayButton();

                if (autoplay) {
                    playAudio();
                }
            }

            function updateCoverDisplay(song) {
                if (song.cover && song.cover.trim() !== '') {
                    coverDisplay.innerHTML =
                        `<img class="cover" src="${escapeHtml(song.cover)}" alt="Portada" onerror="this.style.display='none';this.parentElement.innerHTML='<div class=\\'cover-placeholder\\'><span class=\\'icon\\'>🎵</span></div>';">`;
                } else {
                    coverDisplay.innerHTML =
                        '<div class="cover-placeholder"><span class="icon">🎵</span></div>';
                }
            }

            function updateSongInfo(song) {
                const title = song.title || 'Sin título';
                const artist = song.artist || 'Artista desconocido';
                songInfo.innerHTML = `
                    <div class="song-title" title="${escapeHtml(title)}">${escapeHtml(title)}</div>
                    <div class="song-artist" title="${escapeHtml(artist)}">${escapeHtml(artist)}</div>
                `;
            }

            // ============ REPRODUCCIÓN ============
            function playAudio() {
                if (!audio || !audio.src || audio.src === window.location.href) return;
                const promise = audio.play();
                if (promise && promise.catch) {
                    promise.catch(err => {
                        console.warn('Reproducción bloqueada:', err.message);
                        isPlaying = false;
                        updatePlayButton();
                        player.classList.remove('playing');
                        stopEqualizer();
                    });
                }
            }

            function pauseAudio() {
                if (audio) audio.pause();
            }

            function togglePlay() {
                if (!audio || currentIndex < 0) {
                    if (playlist.length > 0) loadSong(0, true);
                    return;
                }
                if (isPlaying) {
                    pauseAudio();
                } else {
                    // Si no hay src, cargar
                    if (!audio.src || audio.src === window.location.href) {
                        loadSong(currentIndex, true);
                    } else {
                        playAudio();
                    }
                }
            }

            function updatePlayButton() {
                btnPlay.textContent = isPlaying ? '⏸' : '▶';
                btnPlay.setAttribute('aria-label', isPlaying ? 'Pausar' : 'Reproducir');
            }

            // ============ NAVEGACIÓN ============
            function nextSong() {
                if (playlist.length === 0) return;
                let nextIndex;
                if (isShuffled) {
                    shufflePosition++;
                    if (shufflePosition >= shuffleOrder.length) {
                        // Reshuffle
                        updateShuffleOrder();
                        shufflePosition = 0;
                    }
                    nextIndex = shuffleOrder[shufflePosition];
                } else {
                    nextIndex = currentIndex + 1;
                    if (nextIndex >= playlist.length) nextIndex = 0;
                }
                const wasPlaying = isPlaying;
                loadSong(nextIndex, wasPlaying);
                if (!wasPlaying) pauseAudio();
            }

            function prevSong() {
                if (playlist.length === 0) return;
                // Si la canción lleva más de 3 segundos, reiniciar
                if (audio && audio.currentTime > 3) {
                    audio.currentTime = 0;
                    if (!isPlaying) playAudio();
                    return;
                }
                let prevIndex;
                if (isShuffled) {
                    shufflePosition--;
                    if (shufflePosition < 0) shufflePosition = shuffleOrder.length - 1;
                    prevIndex = shuffleOrder[shufflePosition];
                } else {
                    prevIndex = currentIndex - 1;
                    if (prevIndex < 0) prevIndex = playlist.length - 1;
                }
                const wasPlaying = isPlaying;
                loadSong(prevIndex, wasPlaying);
                if (!wasPlaying) pauseAudio();
            }

            function handleSongEnd() {
                if (repeatMode === 2) {
                    // Repetir una
                    if (audio) {
                        audio.currentTime = 0;
                        playAudio();
                    }
                } else if (repeatMode === 1 || isShuffled) {
                    // Repetir todas o shuffle -> siguiente
                    nextSong();
                } else if (currentIndex < playlist.length - 1) {
                    // Siguiente normal
                    nextSong();
                } else {
                    // Última canción sin repeat -> parar
                    pauseAudio();
                    audio.currentTime = 0;
                    progressFill.style.width = '0%';
                    currentTimeEl.textContent = '0:00';
                    updatePlayButton();
                    player.classList.remove('playing');
                    stopEqualizer();
                }
            }

            // ============ SHUFFLE ============
            function toggleShuffle() {
                isShuffled = !isShuffled;
                if (isShuffled) {
                    updateShuffleOrder();
                    // Asegurar que la canción actual esté al frente del shuffle
                    if (currentIndex >= 0) {
                        const pos = shuffleOrder.indexOf(currentIndex);
                        if (pos > 0) {
                            shuffleOrder.splice(pos, 1);
                            shuffleOrder.unshift(currentIndex);
                        }
                        shufflePosition = 0;
                    }
                }
                btnShuffle.classList.toggle('active', isShuffled);
                const tooltip = btnShuffle.querySelector('.tooltip');
                if (tooltip) tooltip.textContent = isShuffled ? 'Aleatorio ON' : 'Aleatorio';
            }

            function updateShuffleOrder() {
                shuffleOrder = playlist.map((_, i) => i);
                // Fisher-Yates shuffle
                for (let i = shuffleOrder.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffleOrder[i], shuffleOrder[j]] = [shuffleOrder[j], shuffleOrder[i]];
                }
                // Poner la canción actual al frente si existe
                if (currentIndex >= 0 && isShuffled) {
                    const pos = shuffleOrder.indexOf(currentIndex);
                    if (pos > 0) {
                        shuffleOrder.splice(pos, 1);
                        shuffleOrder.unshift(currentIndex);
                    }
                    shufflePosition = 0;
                }
            }

            // ============ REPEAT ============
            function toggleRepeat() {
                repeatMode = (repeatMode + 1) % 3;
                const labels = ['🔁', '🔁', '🔂']; // off, all, one
                const tooltipLabels = ['Sin repetir', 'Repetir todas', 'Repetir una'];
                btnRepeat.textContent = labels[repeatMode];
                const tooltip = btnRepeat.querySelector('.tooltip');
                if (tooltip) tooltip.textContent = tooltipLabels[repeatMode];
                btnRepeat.classList.toggle('active', repeatMode >= 1);
                if (repeatMode === 2) btnRepeat.style.color = 'var(--accent)';
                else btnRepeat.style.color = '';
            }

            // ============ VOLUMEN ============
            function setVolume(val) {
                const vol = val / 100;
                if (audio) audio.volume = vol;
                localStorage.setItem('musicPlayer_volume', vol);
                updateVolumeIcon();
            }

            function updateVolumeIcon() {
                const vol = audio ? audio.volume : 0.8;
                if (vol === 0) volumeIcon.textContent = '🔇';
                else if (vol < 0.33) volumeIcon.textContent = '🔈';
                else if (vol < 0.66) volumeIcon.textContent = '🔉';
                else volumeIcon.textContent = '🔊';
            }

            function toggleMute() {
                if (audio) {
                    if (audio.volume > 0) {
                        audio._lastVolume = audio.volume;
                        audio.volume = 0;
                        volumeSlider.value = 0;
                    } else {
                        const v = audio._lastVolume || 0.8;
                        audio.volume = v;
                        volumeSlider.value = Math.round(v * 100);
                    }
                    localStorage.setItem('musicPlayer_volume', audio.volume);
                    updateVolumeIcon();
                }
            }

            // ============ PROGRESS BAR ============
            function seekFromEvent(e) {
                if (!audio || !audio.duration) return;
                const rect = progressBar.getBoundingClientRect();
                const x = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
                const pct = x / rect.width;
                audio.currentTime = pct * audio.duration;
                progressFill.style.width = (pct * 100) + '%';
                currentTimeEl.textContent = formatTime(audio.currentTime);
            }

            // ============ EQUALIZER ============
            function startEqualizer() {
                if (eqInterval) return;
                eqInterval = setInterval(() => {
                    eqBars.forEach(bar => {
                        const h = Math.random() * 20 + 3;
                        bar.style.height = h + 'px';
                    });
                }, 150);
            }

            function stopEqualizer() {
                if (eqInterval) {
                    clearInterval(eqInterval);
                    eqInterval = null;
                }
                eqBars.forEach(bar => {
                    bar.style.height = '4px';
                });
            }

            // ============ PLAYLIST RENDER ============
            function renderPlaylist() {
                if (playlist.length === 0) return;
                playlistContainer.innerHTML = playlist.map((song, i) => {
                    const hasCover = song.cover && song.cover.trim() !== '';
                    const coverHTML = hasCover ?
                        `<img class="pl-cover" src="${escapeHtml(song.cover)}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">` +
                        `<div class="pl-cover-placeholder" style="display:none;">🎵</div>` :
                        `<div class="pl-cover-placeholder">🎵</div>`;
                    return `
                        <div class="playlist-item" data-index="${i}" onclick="window._playerSelectSong(${i})">
                            <span class="pl-index">${i + 1}</span>
                            <span class="pl-playing-indicator">
                                <span class="pl-bar-sm"></span>
                                <span class="pl-bar-sm"></span>
                                <span class="pl-bar-sm"></span>
                                <span class="pl-bar-sm"></span>
                            </span>
                            ${coverHTML}
                            <div class="pl-info">
                                <div class="pl-title">${escapeHtml(song.title || 'Sin título')}</div>
                                <div class="pl-artist">${escapeHtml(song.artist || 'Desconocido')}</div>
                            </div>
                        </div>
                    `;
                }).join('');
                updatePlaylistHighlight();
            }

            function updatePlaylistHighlight() {
                const items = playlistContainer.querySelectorAll('.playlist-item');
                items.forEach(item => {
                    const idx = parseInt(item.getAttribute('data-index'));
                    item.classList.toggle('current', idx === currentIndex);
                    item.classList.toggle('playing', idx === currentIndex && isPlaying);
                });
                // Scroll a la canción actual
                const currentItem = playlistContainer.querySelector('.playlist-item.current');
                if (currentItem) {
                    currentItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            }

            function updatePlaylistDurations() {
                // Actualizar si tenemos duración en el audio cargado
                if (audio && audio.duration && currentIndex >= 0) {
                    totalTimeEl.textContent = formatTime(audio.duration);
                }
            }

            // Función global para seleccionar canción desde la playlist
            window._playerSelectSong = function(index) {
                if (index === currentIndex) {
                    togglePlay();
                    return;
                }
                const wasPlaying = isPlaying;
                loadSong(index, true);
                if (!wasPlaying && !isPlaying) {
                    // Si estaba pausado, mantener pausado pero cargar
                    pauseAudio();
                }
            };

            // ============ EVENTOS DE CONTROLES ============
            function setupControlEvents() {
                btnPlay.addEventListener('click', togglePlay);
                btnNext.addEventListener('click', nextSong);
                btnPrev.addEventListener('click', prevSong);
                btnShuffle.addEventListener('click', toggleShuffle);
                btnRepeat.addEventListener('click', toggleRepeat);

                volumeSlider.addEventListener('input', () => {
                    setVolume(parseInt(volumeSlider.value));
                });
                volumeIcon.addEventListener('click', toggleMute);

                // Progress bar
                progressBar.addEventListener('mousedown', (e) => {
                    dragged = true;
                    seekFromEvent(e);
                });
                document.addEventListener('mousemove', (e) => {
                    if (dragged) seekFromEvent(e);
                });
                document.addEventListener('mouseup', () => {
                    dragged = false;
                });
                // Touch
                progressBar.addEventListener('touchstart', (e) => {
                    dragged = true;
                    seekFromEvent(e.touches[0]);
                });
                document.addEventListener('touchmove', (e) => {
                    if (dragged && e.touches.length > 0) seekFromEvent(e.touches[0]);
                });
                document.addEventListener('touchend', () => {
                    dragged = false;
                });
            }

            // ============ TECLADO ============
            function setupKeyboardEvents() {
                document.addEventListener('keydown', (e) => {
                    // Evitar atajos si el usuario está en un input
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target
                        .isContentEditable) return;

                    switch (e.code) {
                        case 'Space':
                            e.preventDefault();
                            togglePlay();
                            break;
                        case 'ArrowLeft':
                            e.preventDefault();
                            if (audio) audio.currentTime = Math.max(0, audio.currentTime - 10);
                            break;
                        case 'ArrowRight':
                            e.preventDefault();
                            if (audio && audio.duration) audio.currentTime = Math.min(audio.duration, audio
                                .currentTime + 10);
                            break;
                        case 'ArrowUp':
                            e.preventDefault();
                            volumeSlider.value = Math.min(100, parseInt(volumeSlider.value) + 5);
                            setVolume(parseInt(volumeSlider.value));
                            break;
                        case 'ArrowDown':
                            e.preventDefault();
                            volumeSlider.value = Math.max(0, parseInt(volumeSlider.value) - 5);
                            setVolume(parseInt(volumeSlider.value));
                            break;
                        case 'KeyN':
                            e.preventDefault();
                            nextSong();
                            break;
                        case 'KeyP':
                            e.preventDefault();
                            prevSong();
                            break;
                        case 'KeyS':
                            e.preventDefault();
                            toggleShuffle();
                            break;
                        case 'KeyR':
                            e.preventDefault();
                            toggleRepeat();
                            break;
                        case 'KeyM':
                            e.preventDefault();
                            toggleMute();
                            break;
                    }
                });
            }

            // ============ UTILIDADES ============
            function formatTime(seconds) {
                if (!isFinite(seconds) || seconds < 0) return '--:--';
                const m = Math.floor(seconds / 60);
                const s = Math.floor(seconds % 60);
                return m + ':' + s.toString().padStart(2, '0');
            }

            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // ============ ARRANCAR ============
            init();

            console.log('🎧 Reproductor listo. Atajos de teclado: Espacio=Play, ←→=±10s, ↑↓=Vol, N=Next, P=Prev, S=Shuffle, R=Repeat, M=Mute');
        })();
    </script>
</body>
</html>
