<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎧 Reproductor Web</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #14141f;
      --surface2: #1f1f2e;
      --text: #e8e8f0;
      --text-secondary: #9a9ab0;
      --acento: #7c5cfc;
      --acento-hover: #9370ff;
      --progreso-bg: #2a2a3a;
      --radio: 20px;
      --radio-sm: 12px;
      --sombra: 0 12px 36px rgba(0,0,0,0.5);
      --transicion: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 50% 20%, rgba(124,92,252,0.1) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 90%, rgba(92,60,252,0.05) 0%, transparent 50%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
      color: var(--text);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .reproductor {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 28px;
      padding: 2rem 1.5rem 1.25rem;
      width: 100%;
      max-width: 440px;
      box-shadow: var(--sombra), 0 0 80px rgba(124,92,252,0.1);
      backdrop-filter: blur(10px);
      transition: all var(--transicion);
    }
    .contenedor-portada {
      position: relative;
      width: 180px;
      height: 180px;
      margin: 0 auto 1rem;
      border-radius: 50%;
    }
    .anillo-portada {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: var(--acento);
      border-right-color: var(--acento);
      opacity: 0;
      transition: opacity 0.5s;
      pointer-events: none;
    }
    .reproductor.reproduciendo .anillo-portada {
      opacity: 1;
      animation: girar 5s linear infinite;
    }
    @keyframes girar { to { transform: rotate(360deg); } }
    .portada {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 8px 28px rgba(0,0,0,0.6);
      background: var(--surface2);
    }
    .reproductor.reproduciendo .portada {
      animation: latido 4s ease-in-out infinite;
    }
    @keyframes latido {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    .portada-placeholder {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: linear-gradient(135deg, #2a1a5e, #1a1050, #1e1a3a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      opacity: 0.7;
    }
    .ecualizador {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 4px;
      height: 26px;
      margin: 0.25rem 0 0;
      opacity: 0.4;
      transition: opacity 0.4s;
    }
    .reproductor.reproduciendo .ecualizador { opacity: 0.95; }
    .barra-eq {
      width: 4px;
      border-radius: 2px;
      background: var(--acento);
      transition: height 0.15s ease;
      min-height: 3px;
    }
    .info-cancion {
      text-align: center;
      margin: 0.75rem 0 1rem;
      min-height: 3rem;
    }
    .titulo-cancion {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .artista-cancion {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sin-cancion { color: var(--text-secondary); font-style: italic; padding: 0.5rem 0; }
    .area-progreso { margin: 0.5rem 0 0.75rem; }
    .barra-progreso {
      position: relative;
      width: 100%;
      height: 6px;
      background: var(--progreso-bg);
      border-radius: 3px;
      cursor: pointer;
    }
    .relleno-progreso {
      height: 100%;
      background: linear-gradient(90deg, var(--acento), var(--acento-hover));
      border-radius: 3px;
      width: 0%;
      transition: width 0.1s linear;
      position: relative;
    }
    .relleno-progreso::after {
      content: '';
      position: absolute;
      right: -6px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .barra-progreso:hover .relleno-progreso::after,
    .barra-progreso:active .relleno-progreso::after { opacity: 1; }
    .tiempos {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 4px;
      font-variant-numeric: tabular-nums;
      font-family: 'SF Mono', 'Consolas', monospace;
    }
    .controles {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin: 0.5rem 0 0.75rem;
    }
    .btn-control {
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      font-size: 1.5rem;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transicion);
    }
    .btn-control:hover { background: rgba(255,255,255,0.06); transform: scale(1.1); }
    .btn-control:active { transform: scale(0.92); background: rgba(255,255,255,0.12); }
    .btn-play {
      width: 56px;
      height: 56px;
      font-size: 1.8rem;
      background: var(--acento);
      color: #fff;
      box-shadow: 0 6px 20px rgba(124,92,252,0.45);
    }
    .btn-play:hover { background: var(--acento-hover); box-shadow: 0 8px 26px rgba(124,92,252,0.65); transform: scale(1.08); }
    .btn-control.activo { color: var(--acento); }
    .volumen-area { display: flex; align-items: center; gap: 8px; margin: 0.25rem 0 0.75rem; }
    .icono-volumen { font-size: 1.2rem; cursor: pointer; transition: color 0.2s; }
    .deslizador-volumen {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 5px;
      border-radius: 3px;
      background: var(--progreso-bg);
      outline: none;
      cursor: pointer;
    }
    .deslizador-volumen::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
      cursor: pointer;
      transition: transform 0.15s;
    }
    .seccion-playlist {
      border-top: 1px solid rgba(255,255,255,0.06);
      margin-top: 0.5rem;
      padding-top: 0.75rem;
    }
    .encabezado-playlist {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }
    .contenedor-playlist {
      max-height: 220px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--progreso-bg) transparent;
      border-radius: var(--radio-sm);
      padding-right: 4px;
    }
    .contenedor-playlist::-webkit-scrollbar { width: 4px; }
    .contenedor-playlist::-webkit-scrollbar-track { background: transparent; }
    .contenedor-playlist::-webkit-scrollbar-thumb { background: var(--progreso-bg); border-radius: 2px; }
    .item-playlist {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: var(--radio-sm);
      cursor: pointer;
      transition: background 0.2s;
    }
    .item-playlist:hover { background: rgba(255,255,255,0.03); }
    .item-playlist.actual { background: rgba(124,92,252,0.12); }
    .item-playlist .num-cancion {
      width: 24px;
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-secondary);
      flex-shrink: 0;
    }
    .item-playlist.actual .num-cancion { color: var(--acento); font-weight: bold; }
    .item-playlist .miniatura {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      object-fit: cover;
      background: var(--surface2);
    }
    .item-playlist .miniatura-placeholder {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      background: linear-gradient(135deg, #2a1a5e, #1a1050);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }
    .item-playlist .info-item { flex: 1; min-width: 0; }
    .item-playlist .titulo-item {
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .item-playlist.actual .titulo-item { color: var(--acento); }
    .item-playlist .artista-item {
      font-size: 0.72rem;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .indicador-play {
      display: none;
      width: 24px;
      height: 14px;
      justify-content: center;
      align-items: flex-end;
      gap: 2px;
    }
    .item-playlist.actual.reproduciendo .indicador-play { display: flex; }
    .item-playlist.actual.reproduciendo .num-cancion { display: none; }
    .barrita {
      width: 3px;
      background: var(--acento);
      border-radius: 1px;
      animation: barrita-anim 0.6s ease-in-out infinite alternate;
    }
    @keyframes barrita-anim { to { height: 4px; } }

    @media (max-width: 480px) {
      .reproductor { padding: 1.5rem 1rem 1rem; border-radius: 20px; max-width: 100%; }
      .contenedor-portada { width: 140px; height: 140px; }
      .portada-placeholder { font-size: 3rem; }
      .btn-control { width: 38px; height: 38px; font-size: 1.3rem; }
      .btn-play { width: 48px; height: 48px; font-size: 1.5rem; }
      .contenedor-playlist { max-height: 160px; }
    }
  </style>
</head>
<body>
  <div class="reproductor" id="reproductor">
    <div class="contenedor-portada">
      <div class="anillo-portada"></div>
      <div id="vistaPortada">
        <div class="portada-placeholder">🎵</div>
      </div>
    </div>
    <div class="ecualizador" id="ecualizador">
      <div class="barra-eq" style="height:6px"></div>
      <div class="barra-eq" style="height:12px"></div>
      <div class="barra-eq" style="height:18px"></div>
      <div class="barra-eq" style="height:10px"></div>
      <div class="barra-eq" style="height:15px"></div>
      <div class="barra-eq" style="height:8px"></div>
      <div class="barra-eq" style="height:14px"></div>
    </div>
    <div class="info-cancion" id="infoCancion">
      <div class="sin-cancion">Cargando lista de reproducción...</div>
    </div>
    <div class="area-progreso">
      <div class="barra-progreso" id="barraProgreso">
        <div class="relleno-progreso" id="rellenoProgreso"></div>
      </div>
      <div class="tiempos">
        <span id="tiempoActual">0:00</span>
        <span id="tiempoTotal">--:--</span>
      </div>
    </div>
    <div class="controles">
      <button class="btn-control" id="btnAleatorio" title="Aleatorio">🔀</button>
      <button class="btn-control" id="btnAnterior" title="Anterior">⏮</button>
      <button class="btn-control btn-play" id="btnPlay" title="Reproducir">▶</button>
      <button class="btn-control" id="btnSiguiente" title="Siguiente">⏭</button>
      <button class="btn-control" id="btnRepetir" title="Repetición">🔁</button>
    </div>
    <div class="volumen-area">
      <span class="icono-volumen" id="iconoVolumen">🔊</span>
      <input type="range" class="deslizador-volumen" id="deslizadorVolumen" min="0" max="100" value="80">
    </div>
    <div class="seccion-playlist">
      <div class="encabezado-playlist">📋 Lista de reproducción</div>
      <div class="contenedor-playlist" id="contenedorPlaylist">
        <div class="sin-cancion">Cargando...</div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const reproductor = document.getElementById('reproductor');
      const vistaPortada = document.getElementById('vistaPortada');
      const infoCancion = document.getElementById('infoCancion');
      const barraProgreso = document.getElementById('barraProgreso');
      const rellenoProgreso = document.getElementById('rellenoProgreso');
      const tiempoActualEl = document.getElementById('tiempoActual');
      const tiempoTotalEl = document.getElementById('tiempoTotal');
      const btnPlay = document.getElementById('btnPlay');
      const btnAnterior = document.getElementById('btnAnterior');
      const btnSiguiente = document.getElementById('btnSiguiente');
      const btnAleatorio = document.getElementById('btnAleatorio');
      const btnRepetir = document.getElementById('btnRepetir');
      const deslizadorVolumen = document.getElementById('deslizadorVolumen');
      const iconoVolumen = document.getElementById('iconoVolumen');
      const contenedorPlaylist = document.getElementById('contenedorPlaylist');
      const ecualizador = document.getElementById('ecualizador');
      const barrasEq = ecualizador.querySelectorAll('.barra-eq');

      let playlist = [];
      let indiceActual = -1;
      let reproduciendo = false;
      let modoAleatorio = false;
      let modoRepeticion = 0;
      let ordenAleatorio = [];
      let posicionAleatoria = 0;
      let audio = null;
      let intervaloEq = null;
      let arrastrandoBarra = false;

      function formatearTiempo(s) {
        if (!isFinite(s) || s < 0) return '--:--';
        const m = Math.floor(s / 60), sec = Math.floor(s % 60);
        return m + ':' + sec.toString().padStart(2, '0');
      }

      function escaparHTML(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      function actualizarPortada(c) {
        if (c && c.cover) {
          vistaPortada.innerHTML = `<img class="portada" src="${escaparHTML(c.cover)}" onerror="this.style.display='none';this.parentElement.innerHTML='<div class=\\'portada-placeholder\\'>🎵</div>'">`;
        } else {
          vistaPortada.innerHTML = '<div class="portada-placeholder">🎵</div>';
        }
      }

      function actualizarInfo(c) {
        if (!c) return;
        infoCancion.innerHTML = `
          <div class="titulo-cancion">${escaparHTML(c.title || 'Sin título')}</div>
          <div class="artista-cancion">${escaparHTML(c.artist || 'Artista desconocido')}</div>
        `;
      }

      function actualizarBotonPlay() {
        btnPlay.textContent = reproduciendo ? '⏸' : '▶';
      }

      function actualizarIconoVolumen() {
        const v = audio ? audio.volume : 0.8;
        iconoVolumen.textContent = v === 0 ? '🔇' : v < 0.33 ? '🔈' : v < 0.66 ? '🔉' : '🔊';
      }

      function actualizarClaseReproduciendo() {
        reproductor.classList.toggle('reproduciendo', reproduciendo);
      }

      function actualizarResaltadoPlaylist() {
        Array.from(contenedorPlaylist.children).forEach(item => {
          const idx = parseInt(item.dataset.indice);
          item.classList.toggle('actual', idx === indiceActual);
          item.classList.toggle('reproduciendo', idx === indiceActual && reproduciendo);
        });
        const actual = contenedorPlaylist.querySelector('.actual');
        if (actual) actual.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }

      function iniciarEcualizador() {
        if (intervaloEq) return;
        intervaloEq = setInterval(() => {
          barrasEq.forEach(b => b.style.height = Math.floor(Math.random() * 18 + 4) + 'px');
        }, 150);
      }

      function detenerEcualizador() {
        clearInterval(intervaloEq);
        intervaloEq = null;
        barrasEq.forEach(b => b.style.height = '4px');
      }

      function reproducir() {
        if (!audio || !audio.src || audio.src === location.href) return;
        audio.play().catch(() => {});
      }

      function pausar() { if (audio) audio.pause(); }

      function alternarPlay() {
        if (indiceActual < 0 && playlist.length) cargarCancion(0, true);
        else reproduciendo ? pausar() : reproducir();
      }

      function cargarCancion(indice, auto = false) {
        if (!playlist.length || indice < 0 || indice >= playlist.length) return;
        indiceActual = indice;
        if (modoAleatorio) {
          const pos = ordenAleatorio.indexOf(indice);
          if (pos !== -1) posicionAleatoria = pos;
          else {
            generarOrdenAleatorio(indice);
            posicionAleatoria = 0;
          }
        }
        if (!audio) {
          audio = new Audio();
          audio.addEventListener('loadedmetadata', () => {
            if (isFinite(audio.duration)) tiempoTotalEl.textContent = formatearTiempo(audio.duration);
          });
          audio.addEventListener('timeupdate', () => {
            if (!arrastrandoBarra && audio.duration) {
              rellenoProgreso.style.width = (audio.currentTime / audio.duration * 100) + '%';
              tiempoActualEl.textContent = formatearTiempo(audio.currentTime);
            }
          });
          audio.addEventListener('play', () => {
            reproduciendo = true;
            actualizarBotonPlay();
            actualizarClaseReproduciendo();
            iniciarEcualizador();
            actualizarResaltadoPlaylist();
          });
          audio.addEventListener('pause', () => {
            reproduciendo = false;
            actualizarBotonPlay();
            actualizarClaseReproduciendo();
            detenerEcualizador();
            actualizarResaltadoPlaylist();
          });
          audio.addEventListener('ended', manejarFin);
          audio.addEventListener('error', () => {
            if (playlist.length > 1) setTimeout(manejarFin, 300);
            else pausar();
          });
        }
        const cancion = playlist[indice];
        audio.src = cancion.file;
        audio.load();
        actualizarPortada(cancion);
        actualizarInfo(cancion);
        rellenoProgreso.style.width = '0%';
        tiempoActualEl.textContent = '0:00';
        tiempoTotalEl.textContent = '--:--';
        actualizarResaltadoPlaylist();
        actualizarBotonPlay();
        actualizarClaseReproduciendo();
        if (auto) { reproduciendo = true; reproducir(); }
        else { if (reproduciendo) { reproduciendo = false; detenerEcualizador(); } }
      }

      function manejarFin() {
        if (modoRepeticion === 2) { audio.currentTime = 0; reproducir(); }
        else if (modoRepeticion === 1 || modoAleatorio) siguiente();
        else if ((modoAleatorio && posicionAleatoria < ordenAleatorio.length - 1) || (!modoAleatorio && indiceActual < playlist.length - 1)) siguiente();
        else { pausar(); audio.currentTime = 0; rellenoProgreso.style.width = '0%'; }
      }

      function siguiente() {
        if (!playlist.length) return;
        let idx;
        if (modoAleatorio) {
          posicionAleatoria++;
          if (posicionAleatoria >= ordenAleatorio.length) { generarOrdenAleatorio(); posicionAleatoria = 0; }
          idx = ordenAleatorio[posicionAleatoria];
        } else {
          idx = indiceActual + 1;
          if (idx >= playlist.length) idx = 0;
        }
        cargarCancion(idx, true);
      }

      function anterior() {
        if (!playlist.length) return;
        if (audio && audio.currentTime > 3) { audio.currentTime = 0; if (!reproduciendo) reproducir(); return; }
        let idx;
        if (modoAleatorio) {
          posicionAleatoria--;
          if (posicionAleatoria < 0) posicionAleatoria = ordenAleatorio.length - 1;
          idx = ordenAleatorio[posicionAleatoria];
        } else {
          idx = indiceActual - 1;
          if (idx < 0) idx = playlist.length - 1;
        }
        cargarCancion(idx, true);
      }

      function alternarAleatorio() {
        modoAleatorio = !modoAleatorio;
        btnAleatorio.classList.toggle('activo', modoAleatorio);
        if (modoAleatorio) generarOrdenAleatorio(indiceActual >= 0 ? indiceActual : undefined);
        else ordenAleatorio = [];
      }

      function generarOrdenAleatorio(prioritario) {
        ordenAleatorio = playlist.map((_, i) => i);
        for (let i = ordenAleatorio.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [ordenAleatorio[i], ordenAleatorio[j]] = [ordenAleatorio[j], ordenAleatorio[i]];
        }
        if (prioritario !== undefined && ordenAleatorio.includes(prioritario)) {
          ordenAleatorio.splice(ordenAleatorio.indexOf(prioritario), 1);
          ordenAleatorio.unshift(prioritario);
        }
        posicionAleatoria = 0;
      }

      function alternarRepeticion() {
        modoRepeticion = (modoRepeticion + 1) % 3;
        btnRepetir.textContent = ['🔁','🔁','🔂'][modoRepeticion];
        btnRepetir.classList.toggle('activo', modoRepeticion >= 1);
        btnRepetir.style.color = modoRepeticion === 2 ? 'var(--acento)' : '';
      }

      function cambiarVolumen(val) {
        const v = val / 100;
        if (audio) audio.volume = v;
        localStorage.setItem('vol', v);
        actualizarIconoVolumen();
      }

      function alternarSilencio() {
        if (!audio) return;
        if (audio.volume > 0) { audio._ultimo = audio.volume; audio.volume = 0; deslizadorVolumen.value = 0; }
        else { const v = audio._ultimo || 0.8; audio.volume = v; deslizadorVolumen.value = v * 100; }
        localStorage.setItem('vol', audio.volume);
        actualizarIconoVolumen();
      }

      function adelantar(e) {
        if (!audio || !audio.duration) return;
        const rect = barraProgreso.getBoundingClientRect();
        const x = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
        audio.currentTime = (x / rect.width) * audio.duration;
        rellenoProgreso.style.width = (x / rect.width * 100) + '%';
        tiempoActualEl.textContent = formatearTiempo(audio.currentTime);
      }

      // Construir playlist desde JSON remoto
      async function cargarPlaylist() {
        try {
          const resp = await fetch('playlist.json');
          if (!resp.ok) throw new Error('No se encontró playlist.json');
          const datos = await resp.json();
          playlist = datos.filter(c => c.file);
          if (!playlist.length) throw new Error('Playlist vacía');
          renderizarPlaylist();
          const vol = localStorage.getItem('vol');
          if (vol !== null) {
            audio = new Audio();
            audio.volume = parseFloat(vol);
            deslizadorVolumen.value = Math.round(parseFloat(vol) * 100);
          }
          actualizarIconoVolumen();
          cargarCancion(0, false);
          infoCancion.innerHTML = ''; // se llena al cargar canción
        } catch (err) {
          contenedorPlaylist.innerHTML = '<div class="sin-cancion">❌ No se pudo cargar la lista de reproducción. Asegúrate de que el archivo playlist.json existe en la raíz.</div>';
          infoCancion.innerHTML = '<div class="sin-cancion">Error al cargar música</div>';
        }
      }

      function renderizarPlaylist() {
        contenedorPlaylist.innerHTML = playlist.map((c, i) => {
          const cover = c.cover ? `<img class="miniatura" src="${escaparHTML(c.cover)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"><div class="miniatura-placeholder" style="display:none;">🎵</div>` : '<div class="miniatura-placeholder">🎵</div>';
          return `<div class="item-playlist" data-indice="${i}">
            <span class="num-cancion">${i+1}</span>
            <span class="indicador-play">
              <span class="barrita" style="height:8px;animation-delay:0s"></span>
              <span class="barrita" style="height:14px;animation-delay:0.1s"></span>
              <span class="barrita" style="height:10px;animation-delay:0.2s"></span>
              <span class="barrita" style="height:6px;animation-delay:0.3s"></span>
            </span>
            ${cover}
            <div class="info-item">
              <div class="titulo-item">${escaparHTML(c.title || 'Sin título')}</div>
              <div class="artista-item">${escaparHTML(c.artist || 'Artista desconocido')}</div>
            </div>
          </div>`;
        }).join('');
        contenedorPlaylist.addEventListener('click', e => {
          const item = e.target.closest('.item-playlist');
          if (item) {
            const idx = parseInt(item.dataset.indice);
            if (idx === indiceActual) alternarPlay();
            else cargarCancion(idx, true);
          }
        });
      }

      // Eventos UI
      btnPlay.addEventListener('click', alternarPlay);
      btnSiguiente.addEventListener('click', siguiente);
      btnAnterior.addEventListener('click', anterior);
      btnAleatorio.addEventListener('click', alternarAleatorio);
      btnRepetir.addEventListener('click', alternarRepeticion);
      deslizadorVolumen.addEventListener('input', e => cambiarVolumen(e.target.value));
      iconoVolumen.addEventListener('click', alternarSilencio);

      barraProgreso.addEventListener('mousedown', e => { arrastrandoBarra = true; adelantar(e); });
      document.addEventListener('mousemove', e => { if (arrastrandoBarra) adelantar(e); });
      document.addEventListener('mouseup', () => arrastrandoBarra = false);
      barraProgreso.addEventListener('touchstart', e => { arrastrandoBarra = true; adelantar(e.touches[0]); });
      document.addEventListener('touchmove', e => { if (arrastrandoBarra) adelantar(e.touches[0]); });
      document.addEventListener('touchend', () => arrastrandoBarra = false);

      // Atajos teclado
      document.addEventListener('keydown', e => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;
        switch(e.code) {
          case 'Space': e.preventDefault(); alternarPlay(); break;
          case 'ArrowLeft': e.preventDefault(); if (audio) audio.currentTime = Math.max(0, audio.currentTime - 10); break;
          case 'ArrowRight': e.preventDefault(); if (audio && audio.duration) audio.currentTime = Math.min(audio.duration, audio.currentTime + 10); break;
          case 'ArrowUp': e.preventDefault(); deslizadorVolumen.value = Math.min(100, +deslizadorVolumen.value + 5); cambiarVolumen(+deslizadorVolumen.value); break;
          case 'ArrowDown': e.preventDefault(); deslizadorVolumen.value = Math.max(0, +deslizadorVolumen.value - 5); cambiarVolumen(+deslizadorVolumen.value); break;
          case 'KeyN': e.preventDefault(); siguiente(); break;
          case 'KeyP': e.preventDefault(); anterior(); break;
          case 'KeyS': e.preventDefault(); alternarAleatorio(); break;
          case 'KeyR': e.preventDefault(); alternarRepeticion(); break;
          case 'KeyM': e.preventDefault(); alternarSilencio(); break;
        }
      });

      // Inicio
      cargarPlaylist();
    })();
  </script>
</body>
</html>
